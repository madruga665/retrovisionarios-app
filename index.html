<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ff8c00",
            "background-light": "#121212",
            "background-dark": "#000000",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }</script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .neon-glow {
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
    }

    .neon-border {
      box-shadow: 0 0 15px rgba(255, 140, 0, 0.15);
    }
  </style>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .neon-glow {
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
    }

    .neon-border {
      box-shadow: 0 0 15px rgba(255, 140, 0, 0.15);
    }
  </style>
</head>

<body class="bg-black dark:bg-black text-slate-200 dark:text-slate-100 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-md border-b border-primary/20 px-4 py-4">
    <div class="max-w-xl mx-auto flex items-center justify-between">
      <button class="p-2 hover:bg-primary/10 rounded-lg transition-colors">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <h1 class="text-xl font-bold tracking-tighter text-primary neon-glow uppercase italic">Retrovisionários</h1>
      <div class="relative">
        <img class="size-9 rounded-full border-2 border-primary/50" data-alt="User profile picture with neon border"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmMq1F0aHUBPZ0VuOZNep57ck1dGMMD7rfQoFjmE2xiQZhbEyvYCH4R-7C2TFDpPujLpIRIXb57r9bMQd_cTTrNkTIZmrUejC51Wncw5xUOkzk_0RTbro4UIWQMFR8DJ1ryabIewwvbRUAUyUmGxd_fSJudXA7sZaGF8GhlBxkMOfm6S8gFnkBYwldGN90s3BF2MBFyYBl09olTg4FR13yPUMm2kRJgjgdFOxJpNag_h8kf5f654Px3DO-S1a97XBpMU1lcJCIRUs" />
        <div class="absolute bottom-0 right-0 size-2.5 bg-green-500 rounded-full border-2 border-black"></div>
      </div>
    </div>
  </header>
  <!-- Main Content -->
  <main class="flex-1 w-full max-w-xl mx-auto p-4 space-y-6 pb-24">
    <!-- Welcome Section -->
    <section class="py-2">
      <h2 class="text-2xl font-bold tracking-tight">Próximos <span class="text-primary">Eventos</span></h2>
      <p class="text-slate-500 dark:text-slate-400 text-sm">Gerencie a agenda da turnê 2024</p>
    </section>
    <!-- Search/Filter -->
    <div class="relative group">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">search</span>
      <input
        class="w-full bg-zinc-900 border border-primary/20 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 text-sm transition-all outline-none text-white"
        placeholder="Buscar shows ou locais..." type="text" />
    </div>
    <!-- Events List -->
    <div class="space-y-4">
      <!-- Event Card 1 -->
      <div
        class="bg-zinc-900/50 dark:bg-zinc-900/50 border border-slate-800 dark:border-primary/20 rounded-xl overflow-hidden neon-border">
        <div class="h-40 w-full bg-cover bg-center" data-alt="Neon stage with strobe lights and crowds"
          style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDJorlCvEvMoW8MTCYrsp_iyd6CHoOdmAClM6PeoU_k0EHdw1bYZ6UlKoJgqnXacPhSTBhzdnTLxOmJ33_m9P63w0PYwESWFkOkd5S_WtTNmn4Cpbd3qtx9NkKOGTGPvrtWnp2uW7aa4Bjp7IhfcHBsr2cXJ9FRsJWT6MewaFXgoRUnKa5kYuJKXfhIzyvLp1oLUIxZ6aK53meZHRs7JbQalU9YQns1kLh4unkatvggb-2OOJYscKdKDTu86g6idU01rUoC6HgclCE')">
          <div
            class="h-full w-full bg-gradient-to-t from-background-dark/90 to-transparent flex flex-col justify-end p-4">
            <span
              class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full w-fit mb-2 uppercase tracking-widest">Esgotado</span>
            <h3 class="text-white text-lg font-bold leading-tight">Neon Night: São Paulo</h3>
          </div>
        </div>
        <div class="p-4 space-y-4">
          <div class="flex items-center gap-4 text-slate-500 dark:text-slate-400 text-sm">
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-sm text-primary">calendar_month</span>
              <span>25 Out, 2024</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-sm text-primary">schedule</span>
              <span>22:00</span>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <button
              class="flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-2.5 rounded-lg text-sm transition-all shadow-lg shadow-primary/20">
              <span class="material-symbols-outlined text-lg">edit</span>
              Editar
            </button>
            <button
              class="flex items-center justify-center gap-2 bg-zinc-800 hover:bg-red-900/20 text-slate-300 hover:text-red-500 font-bold py-2.5 rounded-lg text-sm transition-all">
              <span class="material-symbols-outlined text-lg">delete</span>
              Deletar
            </button>
          </div>
        </div>
      </div>
      <!-- Event Card 2 -->
      <div
        class="bg-zinc-900/50 dark:bg-zinc-900/50 border border-slate-800 dark:border-primary/20 rounded-xl overflow-hidden neon-border">
        <div class="h-40 w-full bg-cover bg-center" data-alt="Cyberpunk city alley with purple neon signs"
          style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDgo5oGTSVnPQtCxGWXzwctd2YhJk-euZ7hY4EE6fTrRA-ZQPLdj9WTjqzne5ISh4hxy1LrNhMPUxxXsqA1S3zy2GeBt6wnhTKVNjK5lOREL31nF5-nPmVaIS5mpMi5G2BL_HduVHXImWojH0zJBmA8OvlR6ldxwM79-Hs8DUVV_0191hJi4faRaD9rB4n4VJG2H7hhLfhDtefsvWjkyvUO-OBll6R2iGlhK9PcEjRBVeZKmjnRjN16kZLbr4pWHqJn8GVWitEn430')">
          <div
            class="h-full w-full bg-gradient-to-t from-background-dark/90 to-transparent flex flex-col justify-end p-4">
            <span
              class="bg-primary/30 border border-primary/50 text-white text-[10px] font-bold px-2 py-1 rounded-full w-fit mb-2 uppercase tracking-widest">Confirmado</span>
            <h3 class="text-white text-lg font-bold leading-tight">Synthwave Sessions</h3>
          </div>
        </div>
        <div class="p-4 space-y-4">
          <div class="flex items-center gap-4 text-slate-500 dark:text-slate-400 text-sm">
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-sm text-primary">calendar_month</span>
              <span>02 Nov, 2024</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-sm text-primary">schedule</span>
              <span>21:30</span>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <button
              class="flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-2.5 rounded-lg text-sm transition-all shadow-lg shadow-primary/20">
              <span class="material-symbols-outlined text-lg">edit</span>
              Editar
            </button>
            <button
              class="flex items-center justify-center gap-2 bg-zinc-800 hover:bg-red-900/20 text-slate-300 hover:text-red-500 font-bold py-2.5 rounded-lg text-sm transition-all">
              <span class="material-symbols-outlined text-lg">delete</span>
              Deletar
            </button>
          </div>
        </div>
      </div>
      <!-- Add Event Floating Button Placeholder -->
      <div class="flex justify-center pt-4">
        <button
          class="bg-primary/10 border-2 border-dashed border-primary/40 rounded-xl p-6 w-full flex flex-col items-center justify-center text-primary hover:bg-primary/20 transition-all">
          <span class="material-symbols-outlined text-4xl mb-2">add_circle</span>
          <span class="font-bold text-sm uppercase tracking-wider">Novo Evento</span>
        </button>
      </div>
    </div>
  </main>
  <!-- Bottom Navigation Bar -->
  <nav
    class="fixed bottom-0 left-0 right-0 z-50 bg-black border-t border-primary/20 pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.8)]">
    <div class="max-w-xl mx-auto flex justify-around items-center px-4 py-3">
      <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-primary" href="#">
        <span class="material-symbols-outlined fill-1">calendar_month</span>
        <span class="text-[10px] font-bold uppercase tracking-widest">Eventos</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
        <span class="material-symbols-outlined">music_note</span>
        <span class="text-[10px] font-bold uppercase tracking-widest">Músicas</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px] font-bold uppercase tracking-widest">Perfil</span>
      </a>
    </div>
  </nav>
</body>

</html>
